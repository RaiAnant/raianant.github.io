<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>Anant Rai - Photography</title>
  <meta name="author" content="Anant Rai">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="stylesheet.css">
  <link rel="icon" type="image/png" href="images/seal_icon.png">
  
  <style>
    /* Navigation styling */
    .nav-header {
      padding: 2.5% 0;
      margin-bottom: 20px;
    }
    
    /* Masonry Grid Layout for varying image sizes */
    .masonry-gallery {
      column-count: 3;
      column-gap: 20px;
      padding: 0 15px;
    }
    
    /* Individual photo item wrapper */
    .gallery-item {
      position: relative;
      margin-bottom: 20px;
      break-inside: avoid; /* Prevents images splitting across columns */
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    
    .gallery-item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 15px rgba(0,0,0,0.2);
    }
    
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      background-color: #f0f0f0; /* Placeholder color while loading */
    }
    
    /* Dark overlay effect on hover */
    .photo-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .gallery-item:hover .photo-overlay {
      opacity: 1;
    }
    
    /* Stylish "View" button inside overlay */
    .view-btn {
      background-color: #ffffff;
      color: #333333;
      border: none;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 20px;
      pointer-events: none; /* Allows the click to pass through to the main item */
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: background-color 0.2s;
    }
    
    /* Large UI Element / Lightbox Modal Styling */
    .lightbox-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9); /* Dark background behind image */
      display: none; /* Hidden by default */
      justify-content: center;
      align-items: center;
      z-index: 9999; /* Keeps it on top of everything else */
      cursor: zoom-out;
    }
    
    /* Expanded high-res image styling */
    .lightbox-content {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      animation: zoomIn 0.2s ease-out; /* Smooth transition when opening */
    }
    
    @keyframes zoomIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Responsive design for smaller screens */
    @media (max-width: 800px) {
      .masonry-gallery {
        column-count: 2;
      }
    }
    @media (max-width: 500px) {
      .masonry-gallery {
        column-count: 1;
      }
    }
  </style>
</head>

<body>
  <table style="width:100%;max-width:920px;border:0px;border-spacing:0px;border-collapse:separate;margin-right:auto;margin-left:auto;">
    <tbody>
      <tr style="padding:0px">
        <td style="padding:0px">
          
          <div class="nav-header" style="padding-left: 20px;">
            <heading>Photography</heading>
            <p>
              <a href="index.html">← Back to Home</a>
            </p>
          </div>

          <div class="masonry-gallery" id="photo-gallery">
            </div>

          <table width="100%" cellpadding="20"><tbody>
            <tr>
              <p style="text-align: right; margin-top: 40px;">
                <a href="https://jonbarron.info/">Template From Here</a>
              </p>
            </tr>
          </tbody></table>

        </td>
      </tr>
    </tbody>
  </table>

  <div class="lightbox-modal" id="lightbox">
    <img class="lightbox-content" id="lightbox-img" src="" alt="Expanded View">
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const folderPath = 'images/photography/';
      
      // CHANGE THIS NUMBER: Set it to your maximum image number
      const N = 23; 
      
      const fileExtension = '.jpg';

      // Generate sequence array
      const imageFiles = [];
      for (let i = 1; i <= N; i++) {
        imageFiles.push(i + fileExtension);
      }

      // Randomize shuffle
      for (let i = imageFiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [imageFiles[i], imageFiles[j]] = [imageFiles[j], imageFiles[i]];
      }

      // Injecting structural elements into the gallery
      const gallery = document.getElementById('photo-gallery');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      
      imageFiles.forEach(file => {
        // 1. Create outer card item
        const item = document.createElement('div');
        item.className = 'gallery-item';
        
        // 2. Create the image
        const img = document.createElement('img');
        img.src = folderPath + file;
        img.alt = "Photography Grid Asset";
        img.loading = "lazy"; 
        
        // 3. Create the hover overlay block
        const overlay = document.createElement('div');
        overlay.className = 'photo-overlay';
        
        // 4. Create the "View" button inside overlay
        const btn = document.createElement('button');
        btn.className = 'view-btn';
        btn.innerText = 'View';
        
        // Assemble elements
        overlay.appendChild(btn);
        item.appendChild(img);
        item.appendChild(overlay);
        
        // Interaction: Clicking the photo opens the full screen UI element
        item.addEventListener('click', () => {
          lightboxImg.src = img.src;
          lightbox.style.display = 'flex';
        });

        gallery.appendChild(item);
      });

      // Interaction: Clicking outside the image (on the background overlay) closes it
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) {
          lightbox.style.display = 'none';
          lightboxImg.src = ''; // Clear image source to save runtime memory
        }
      });
    });
  </script>
</body>
</html>
